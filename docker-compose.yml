services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: dataforge-zookeeper
    restart: unless-stopped
    ports:
      - "22181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xms128m -Xmx256m"
    volumes:
      - dataforge_zk_data:/var/lib/zookeeper/data
      - dataforge_zk_log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: dataforge-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "19092:9092"
      - "29093:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:19092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 268435456
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
    volumes:
      - dataforge_kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12

  solr:
    image: solr:9
    container_name: dataforge-solr
    restart: unless-stopped
    ports:
      - "18983:8983"
    environment:
      SOLR_HEAP: 512m
    command:
      - bash
      - -lc
      - |
        mkdir -p /var/solr/data/configsets
        if [ ! -d /var/solr/data/configsets/_default ]; then
          cp -R /opt/solr/server/solr/configsets/_default /var/solr/data/configsets/_default
        fi
        /opt/solr/docker/scripts/precreate-core reportcore
        /opt/solr/docker/scripts/precreate-core reportcore_dlq
        exec /opt/solr/docker/scripts/solr-foreground
    volumes:
      - dataforge_solr_data:/var/solr
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8983/solr/admin/info/system >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: dataforge-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "18080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: dataforge
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  bootstrap:
    image: confluentinc/cp-kafka:7.5.0
    container_name: dataforge-bootstrap
    depends_on:
      kafka:
        condition: service_healthy
      solr:
        condition: service_healthy
    volumes:
      - ./scripts/bootstrap.sh:/opt/bootstrap.sh:ro
    environment:
      MAIN_PARTITIONS: 4
      DLQ_PARTITIONS: 1
    command: ["bash", "/opt/bootstrap.sh"]
    restart: "no"

  php-api:
    build:
      context: ./backend/api
    container_name: dataforge-php-api
    restart: unless-stopped
    depends_on:
      solr:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    ports:
      - "18081:8081"
    volumes:
      - ./sample-data:/app/sample-data:ro
      - ../data:/app/data:ro
    environment:
      APP_PORT: 8081
      SOLR_BASE_URL: http://solr:8983/solr/reportcore
      SAMPLE_DATA_PATH: /app/data

  php-worker:
    build:
      context: ./backend/worker
    container_name: dataforge-php-worker
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      solr:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    volumes:
      - ./sample-data:/app/sample-data:ro
      - ../data:/app/data:ro
    environment:
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC: report_data_topic
      KAFKA_DLQ_TOPIC: report_data_topic_dlq
      SOLR_UPDATE_URL: http://solr:8983/solr/reportcore/update?commitWithin=5000
    command: ["sleep", "infinity"]

  react-frontend:
    image: node:20-alpine
    container_name: dataforge-react
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: ["sh", "-c", "if [ -f package.json ]; then npm install && npm run dev -- --host 0.0.0.0 --port 5173; else echo 'Frontend not initialized yet.' && sleep infinity; fi"]
    ports:
      - "15173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://php-api:8081
    depends_on:
      php-api:
        condition: service_started

volumes:
  dataforge_kafka_data:
  dataforge_solr_data:
  dataforge_zk_data:
  dataforge_zk_log:

